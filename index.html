<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Trava-Línguas IMPOSSÍVEIS - Ninguém Consegue Falar</title>
<meta name="description" content="Os trava-línguas mais difíceis do Brasil. Desafie seus amigos. Duvido você falar sem travar!">
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Arial', sans-serif;
    background: #2c3e50;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
    color: #2c3e50;
  }
.container {
    background: white;
    padding: 30px 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
    max-width: 500px;
    width: 100%;
    text-align: center;
    margin-top: 20px;
  }
  h1 {
    color: #c0392b;
    font-size: 28px;
    margin-bottom: 10px;
  }
.badge {
    display: inline-block;
    background: #e74c3c;
    color: white;
    padding: 6px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 20px;
  }
.subtitulo {
    color: #7f8c8d;
    margin-bottom: 25px;
    font-size: 16px;
  }
  #frase {
    background: #fdedec;
    padding: 25px;
    border-radius: 15px;
    font-size: 20px;
    font-weight: bold;
    min-height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 20px 0;
    line-height: 1.5;
    border: 3px dashed #c0392b;
  }
  button {
    background: #c0392b;
    color: white;
    border: none;
    padding: 15px 30px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin: 10px 0;
    transition: 0.3s;
  }
  button:hover {
    background: #a93226;
    transform: scale(1.03);
  }
.btn-facil {
    background: #2ecc71;
  }
.btn-facil:hover {
    background: #27ae60;
  }
.contador {
    margin-top: 15px;
    font-size: 14px;
    color: #7f8c8d;
  }
  footer {
    margin-top: 30px;
    font-size: 14px;
    color: #bdc3c7;
  }
  footer a {
    color: #bdc3c7;
    text-decoration: underline;
  }

  /* POPUP DO VÍDEO */
  #videoPopup {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.95);
    z-index: 9999;
    justify-content: center;
    align-items: center;
    flex-direction: column;
  }
.video-box {
    position: relative;
    width: 90%;
    max-width: 400px;
  }
  #meuVideo {
    width: 100%;
    border-radius: 12px;
  }
.fechar-video {
    position: absolute;
    top: -45px; right: 0;
    background: #e74c3c;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 8px;
    font-weight: bold;
    cursor: pointer;
  }
.aviso-video {
    color: white;
    margin-top: 15px;
    font-size: 14px;
  }
</style>
</head>
<body>
<div class="container">
  <h1>💀 Trava-Línguas</h1>
  <span class="badge">🔴 MODO IMPOSSÍVEL</span>
  <p class="subtitulo">Nível demônio. Travou? Culpa sua.</p>

  <div id="frase">Clique no botão para começar!</div>

  <button onclick="novaFrase(); mostrarVideo();">Próxima Frase</button>
  <button class="btn-facil" onclick="window.location.href='https://manuelduarte0.github.io/trava-lingua/'">
    🟢 Voltar pro Modo FÁCIL
  </button>

  <div class="contador">Frases vistas: <span id="count">0</span></div>
</div>

<footer>
  <a href="privacidade.html">Política de Privacidade</a>
</footer>

<!-- POPUP DO VÍDEO -->
<div id="videoPopup">
  <div class="video-box">
    <button class="fechar-video" onclick="fecharVideo()">Fechar X</button>
    <video id="meuVideo" controls playsinline>
      <source src="video-impossivel.mp4" type="video/mp4">
      Seu navegador não suporta vídeo.
    </video>
    <p class="aviso-video">Travou no vídeo também? 😂</p>
  </div>
</div>

<script>
// LISTA DE TRAVA-LÍNGUAS IMPOSSÍVEIS
const frases = [
  "O desinquivincavacador das caravelarias desinquivincavacaria as cavidades que deveriam ser desinquivincavacadas",
  "Se o bispo de Constantinopla a quisesse desconstantinoplizar, não haveria desconstantinoplizador que o desconstantinoplizasse",
  "Num ninho de mafagafos, cinco mafagafinhos há. Quem os desmafagafizar, bom desmafagafizador será",
  "A Iara agarra e amarra a rara arara de Araraquara",
  "O princípio principal do príncipe principiava principalmente no princípio principesco da princesa",
  "Qual é o doce que é mais doce que o doce de batata-doce? O doce que é mais doce que o doce de batata-doce é o doce que a doce Dora produziu",
  "Três pratos de trigo para três tristes tigres. Três tigres tristes para três pratos de trigo",
  "O Rato Tibúrcio roeu o rôo da roupa da Rainha da Rússia em Roma",
  "A vida é uma sucessiva sucessão de sucessões que se sucedem sucessivamente",
  "Otorrinolaringologista, o trabalho desotimalizador desotimalizaria o otimizador",
  "Perlustrando patéticas paisagens, peripatéticos poetas pleiteiam o pálido prêmio",
  "Se cá nevasse, fazia-se cá ski. Se cá não nevasse, não se fazia cá ski",
  "Disseram que na minha rua tem paralelepípedo. Paralelepípedos na minha rua têm",
  "Se o Arcebispo-Bispo de Constantinopla a quisesse desarcebispoconstantinoplizar, não haveria desarcebispoconstantinoplizador",
  "Sabendo o que sei e sabendo o que sabes e o que não sabes e o que não sabemos, ambos saberemos se somos sábios",
  "O caju do Juca e a jaca do cajá. Já o cajá da Juju e a juca do Jacá",
  "Pneumoultramicroscopicossilicovulcanoconiótico é quem sofre dessa doença",
  "Hipopotomonstrosesquipedaliofobia é o medo de palavras grandes",
  "O tempo perguntou ao tempo quanto tempo o tempo tem. O tempo respondeu ao tempo que o tempo tem tanto tempo quanto tempo o tempo tem",
  "Lara amarela laranjada a laranja. Arara laranja laranjada a Lara",
  "Tatá, a tata tataravó da tua tia, tentou tocar tuba",
  "Farofa feita com muita farinha fofa faz uma fofoca feia",
  "Esta casa está en ladrilhada. Quem a desenladrilhar, bom desenladrilhador será",
  "A chave do chefe Chaves na choupana choca o chuchu",
  "Se cada um vai a casa de cada um é porque cada um quer que cada um vá lá, cada um com cada um"
];

let usadas = [];
let contadorCliques = 0;
let contadorTotal = 0;

function novaFrase() {
  if (usadas.length === frases.length) usadas = []; // Reseta quando acabar

  let sorteio;
  do {
    sorteio = Math.floor(Math.random() * frases.length);
  } while (usadas.includes(sorteio));

  usadas.push(sorteio);
  document.getElementById('frase').innerText = frases[sorteio];

  contadorTotal++;
  document.getElementById('count').innerText = contadorTotal;
}

// CONTROLE DO VÍDEO
function mostrarVideo() {
  contadorCliques++;
  // MOSTRA VÍDEO A CADA 3 FRASES. Muda o 3 se quiser
  if (contadorCliques % 3 === 0) {
    const popup = document.getElementById('videoPopup');
    const video = document.getElementById('meuVideo');
    popup.style.display = 'flex';
    video.play();
  }
}

function fecharVideo() {
  const popup = document.getElementById('videoPopup');
  const video = document.getElementById('meuVideo');
  popup.style.display = 'none';
  video.pause();
  video.currentTime = 0;
}

// Começa com uma frase
novaFrase();
</script>
</body>
</html>
